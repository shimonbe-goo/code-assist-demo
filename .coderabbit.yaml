# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration.
# CodeRabbit reads this file from the base branch of each PR.
# To see the effective config on a PR, comment: @coderabbitai configuration

language: "en-US"

# Sets the overall voice of the review comments.
tone_instructions: "Be direct and technical. Focus on security and correctness. Skip praise."

reviews:
  # "assertive" surfaces more issues, including lower-confidence ones.
  # "chill" only reports high-confidence problems.
  profile: "assertive"

  # When true, CodeRabbit posts a "changes requested" review, which can
  # block merge if you also add a branch protection rule requiring its approval.
  request_changes_workflow: true

  # The PR summary and the file-by-file walkthrough.
  high_level_summary: true
  review_status: true
  collapse_walkthrough: false

  # Turn the closing poem off to keep reviews looking professional.
  poem: false

  auto_review:
    enabled: true
    # Do not review draft PRs.
    drafts: false
    # Only auto-review PRs targeting these branches.
    base_branches:
      - "main"
      - "develop"

  # Skip files that should never be reviewed. "!" means exclude.
  path_filters:
    - "!**/*.min.js"
    - "!**/dist/**"
    - "!**/*.lock"

  # Custom review rules scoped to file paths. This is how you encode
  # your own standards on top of the built-in checks.
  path_instructions:
    - path: "**/*.py"
      instructions: >
        Flag any hardcoded secret, password, or API key.
        Require parameterized SQL queries, never string concatenation.
        Reject use of eval, exec, or shell=True on user input.
        Require files to be opened with a context manager.
    - path: "app.py"
      instructions: >
        This is the web entry point. Every route that reads request input
        must validate it. Admin routes must require authentication.

  # Enable or disable the analyzers CodeRabbit runs.
  tools:
    ruff:
      enabled: true
    gitleaks:
      enabled: true

chat:
  # Let CodeRabbit reply automatically when you mention @coderabbitai.
  auto_reply: true
